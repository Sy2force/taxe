services:
  - type: web
    name: correcteur-fiscalite-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5051
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: correcteur-fiscalite-db
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: correcteur-fiscalite-db
    databaseName: correcteur_fiscalite
    user: correcteur_fiscalite_user
